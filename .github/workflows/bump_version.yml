name: Bump package version

on:
  push:
    branches:
      - master
      - feat/coverage-reports

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Setup .NET
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Restore dependencies
        run: |
          dotnet restore
          dotnet tool restore
      - name: Build
        run: dotnet build --no-restore
      - name: Run tests
        run: |
          dotnet test -- --coverage --coverage-output-format cobertura --ignore-exit-code 8
          dotnet reportgenerator "-reports:tests/**/TestResults/**/*.cobertura.xml" -targetdir:CoverageReport -reporttypes:Html_Dark,Badges
      - name: Commit changes
        run: |
          git status
          git config user.name "ooze"
          git config user.email "ooze@users.noreply.github.com"
          git add ./src/*
          git add ./CoverageReport/badge_combined.svg
          git status
